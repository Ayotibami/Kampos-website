<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#165abf" />

    <title>Kampos - Your campus life in one app</title>
    <!-- Kept under ~155 chars so Google shows it whole. The longer, punchier
         version is used for social cards below, where there's more room. -->
    <meta
      name="description"
      content="Kampos connects Nigerian students to their campuses — official updates, announcements, gists and hot takes, all in one place."
    />

    <!-- Homepage canonical. RootLayout rewrites this per route on navigation,
         otherwise every page would claim to be the homepage. -->
    <link rel="canonical" href="%REACT_APP_SITE_URL%/" />

    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Social previews. og:url and og:image must be absolute URLs — link
         scrapers won't resolve relative paths — so the domain comes from
         REACT_APP_SITE_URL (see .env). Set that variable in Vercel to point
         at a custom domain; no code change needed. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kampos" />
    <meta property="og:title" content="Kampos - Your campus life in one app" />
    <meta
      property="og:description"
      content="Kampos connects students to their campuses. From official updates and announcements to wild rants, gists, and hot takes, Kampos drops you right in the middle of all the vibes — bringing your entire campus life straight to your phone."
    />
    <meta property="og:url" content="%REACT_APP_SITE_URL%/" />
    <meta
      property="og:image"
      content="%REACT_APP_SITE_URL%/og-image.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Kampos" />
    <meta property="og:locale" content="en_NG" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kampos - Your campus life in one app" />
    <meta
      name="twitter:description"
      content="Kampos connects students to their campuses. From official updates and announcements to wild rants, gists, and hot takes, Kampos drops you right in the middle of all the vibes — bringing your entire campus life straight to your phone."
    />
    <meta
      name="twitter:image"
      content="%REACT_APP_SITE_URL%/og-image.png"
    />
    <meta name="twitter:image:alt" content="Kampos" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Kampos.</noscript>
    <div id="root"></div>
  </body>
</html>
